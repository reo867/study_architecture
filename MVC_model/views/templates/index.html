<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MVC ToDo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>MVC ToDo</h1>
        <p>Controller → Model → View の流れが見える最小アプリ</p>
      </header>

      <section class="card">
        <h2>新規ToDo</h2>
        {% if error %}
          <p class="error">{{ error }}</p>
        {% endif %}
        <form class="todo-form" method="post" action="{{ url_for('todo.add') }}">
          <input type="text" name="title" placeholder="例: 資料を作る" />
          <button type="submit">追加</button>
        </form>
      </section>

      <section class="card">
        <h2>ToDo一覧</h2>
        {% if todos %}
          <ul class="todo-list">
            {% for todo in todos %}
              <li class="todo-item">
                <form method="post" action="{{ url_for('todo.toggle', todo_id=todo.id) }}">
                  <button class="toggle" type="submit">
                    {% if todo.is_done %}完了{% else %}未完了{% endif %}
                  </button>
                </form>
                <span class="title {% if todo.is_done %}done{% endif %}">
                  {{ todo.title }}
                </span>
                <form method="post" action="{{ url_for('todo.delete', todo_id=todo.id) }}">
                  <button class="delete" type="submit">削除</button>
                </form>
              </li>
            {% endfor %}
          </ul>
        {% else %}
          <p class="muted">まだToDoがありません。</p>
        {% endif %}
      </section>
    </main>
  </body>
</html>
